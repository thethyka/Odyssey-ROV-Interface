# Fly.io app configuration for the Odyssey ROV backend.
#
# Setup (one-time, see T1-6):
#   fly launch --no-deploy --copy-config --name odyssey-rov-backend
#   fly secrets set DATABASE_URL=... CORS_ORIGINS=https://<user>.github.io
#
# Deploys are run from CI via `fly deploy` (see .github/workflows/deploy.yml),
# which requires a FLY_API_TOKEN repo secret.

app = "odyssey-rov-backend"
primary_region = "lhr"

[build]
  dockerfile = "backend/Dockerfile"
  context = "backend"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
