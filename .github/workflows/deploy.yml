name: Deploy

on:
  push:
    branches: [main]

env:
  NODE_VERSION: "22"
  PAGES_URL: https://${{ github.repository_owner }}.github.io/Odyssey-ROV-Interface/
  FLY_APP_URL: https://odyssey-rov-backend.fly.dev

permissions:
  contents: read

jobs:
  deploy-frontend:
    name: Deploy / Frontend (GitHub Pages)
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://odyssey-rov-backend.fly.dev' }}
          VITE_WS_URL: ${{ vars.VITE_WS_URL || 'wss://odyssey-rov-backend.fly.dev' }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist
      - id: deployment
        uses: actions/deploy-pages@v4

  deploy-backend:
    name: Deploy / Backend (Fly.io)
    runs-on: ubuntu-latest
    # TODO(T1-6): remove once the Fly app + FLY_API_TOKEN secret exist.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  smoke-test:
    name: Deploy / Smoke test
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-backend]
    if: always()
    steps:
      - name: Frontend reachable over HTTPS
        run: curl --fail --silent --show-error "${{ env.PAGES_URL }}" > /dev/null

      - name: Backend healthz
        continue-on-error: true
        run: curl --fail --silent --show-error "${{ env.FLY_APP_URL }}/healthz"

      - name: Backend WebSocket handshake
        continue-on-error: true
        run: |
          pip install --quiet websockets
          python3 - <<'PY'
          import asyncio
          import websockets

          async def main():
              url = "${{ env.FLY_APP_URL }}".replace("https://", "wss://") + "/ws/telemetry"
              async with websockets.connect(url) as ws:
                  await ws.recv()

          asyncio.run(main())
          PY
