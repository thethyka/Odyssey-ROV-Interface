version: '3.8'

services:
  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=odyssey
      - POSTGRES_PASSWORD=odyssey
      - POSTGRES_DB=odyssey
    volumes:
      - odyssey-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odyssey"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    depends_on:
      - db

  backend:
    build:
      context: ./backend
    working_dir: /app
    volumes:
      - ./backend:/app/backend
    command: sh -c "alembic -c backend/alembic.ini upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /app
    environment:
      - VITE_API_BASE=http://localhost:8000
    volumes:
      - ./frontend:/app
    command: sh -c "npm ci && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  odyssey-db-data: